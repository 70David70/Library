<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Library</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="container">
            <nav class="navigation-bar">
                <h1>Library</h1>
                <div>
                    <button>on the shelf</button>
                    <button>completed</button>
                    <button>unfinished</button>
                </div>
            </nav>
            <div id="add" class="add">+</div>
            <div id="popupBackground" class="hidden">
                <div id="popupCreate">
                    <div class="pop-nav">
                        <div id="closePopup">X</div>
                    </div>
                    <form method="get" id="newBox">
                        <!-- TODo:
                         when the user chooses a pic. you get a url(no uploading in frontend).
                         that the browser generates which you can do whatever u want with it
                         change the background of the label to the pic
                         of the label to this pic -->
                         <label for="uploadPic" id="newBoxImage">
                            upload a picture
                         </label>
                        <input type="file" accept="image/*" id="uploadPic">
                            <fieldset id="newBoxInfo">
    
                                <div class="title-input input-style">
                                    <label for="getBoxName">Title</label>
                                    <input type="text" id="getBoxName" placeholder="Example: Titanic" required>
                                </div>

                                <div class="author-input input-style">
                                    <label for="getBoxAuthor">Author</label>
                                    <input type="text" id="getBoxAuthor" placeholder="Example: james Cameron" required>
                                </div>
        
                                <div class="completed-input">
                                    <label for="isCompleted">DId you complete it?</label>
                                    <input type="checkbox" id="isCompleted">
                                </div>
        
                                <div class="pages-input input-style">
                                    <label for="getBoxPagecount">Number of pages/episodes</label>
                                    <input type="number" id="getBoxPagecount" placeholder="Example:151" required>
                                </div>
        
                                <button type="submit" id="newBoxSubmit">Create</button>
                            </fieldset>
                    </form>
                </div>
            </div>
            <div class="content">
                
            </div>
            <footer class="footer">
                <a href="https://github.com/70David70">made by @70David70</a>
            </footer>
        </div>
    </body>
</html>
